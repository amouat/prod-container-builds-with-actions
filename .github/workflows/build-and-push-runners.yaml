name: Multiplatform Build with Runners

# This action isn't enabled by default as it requires an arm runner
# If you have an arm runner, set it in "runs-on" on in the armbuild job

on:
#  push:
  workflow_dispatch:

jobs:
  armbuild:
    runs-on: [linux-arm-for-testing]
    permissions:
      id-token: write
      attestations: write
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      -
        name: Set up Docker Buildx
        uses: chainguard-actions/docker-setup-buildx-action@8fbaa429a8f774ef64700ee4749056cd9aba100b # v3
      -
        name: Login to GitHub Container Registry
        uses: chainguard-actions/docker-login-action@c4e74ea6a0c39bc863791d3b4b737e06e93d4da7 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: chainguard-actions/docker-metadata-action@f6351596652d2adfcc044e05dad701b11e2c783b # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-runner
          tags: |
            type=raw,arm-${{ github.RUN_ID }}
          labels: |
            org.opencontainers.image.description=Demo Arm Runner
      -
        id: build
        name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: Dockerfile
          platforms: linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      -
        name: Attest
        uses: chainguard-actions/actions-attest-build-provenance@ba968bd7c54b40a4f8c43282db9943c6a6332327 # v4.1.0
        id: attest
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-runner
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  x86build:
    runs-on: [ubuntu-latest-2-cores-testing]
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    permissions:
      id-token: write
      attestations: write
      contents: read
      packages: write
    steps:
      -
        name: Set up Docker Buildx
        uses: chainguard-actions/docker-setup-buildx-action@8fbaa429a8f774ef64700ee4749056cd9aba100b # v3
      -
        name: Login to GitHub Container Registry
        uses: chainguard-actions/docker-login-action@c4e74ea6a0c39bc863791d3b4b737e06e93d4da7 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: chainguard-actions/docker-metadata-action@f6351596652d2adfcc044e05dad701b11e2c783b # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-runner
          tags: |
            type=raw,x86-${{ github.RUN_ID }}
          labels: |
            org.opencontainers.image.description=Demo X86 Runner
      -
        id: build
        name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          file: Dockerfile
          platforms: linux/amd64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      -
        name: Attest
        uses: chainguard-actions/actions-attest-build-provenance@ba968bd7c54b40a4f8c43282db9943c6a6332327 # v4.1.0
        id: attest
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-runner
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  manifest:
    permissions:
     id-token: write
     attestations: write
     packages: write
    needs: [x86build, armbuild]
    runs-on: ubuntu-latest
    steps:
      -
        name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
      -
        name: Login to GitHub Container Registry
        uses: chainguard-actions/docker-login-action@c4e74ea6a0c39bc863791d3b4b737e06e93d4da7 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Install crane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4
      -
        name: Create, Push and Sign Multi-Platform Manifest
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-runner
          X86DIGEST=$(crane digest --platform linux/amd64 ${IMAGE}@${{ needs.x86build.outputs.digest }})

          ARMDIGEST=$(crane digest --platform linux/arm64 ${IMAGE}@${{ needs.armbuild.outputs.digest }})
          docker manifest create ${IMAGE}:multi-${{ github.RUN_ID }} \
            ${IMAGE}@$X86DIGEST \
            ${IMAGE}@$ARMDIGEST

          MULTIDIGEST=$(docker manifest push ${IMAGE}:multi-${{ github.RUN_ID }})
          cosign sign -r --yes ${IMAGE}@$MULTIDIGEST

