name: Zizmor

on:
  pull_request:
    branches: ['main']
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  push:
    branches: ['main']
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'

permissions: {}

jobs:
  zizmor:
    name: Zizmor
    runs-on: ubuntu-latest
    permissions:
      actions: read # Required by codeql-action/upload-sarif to get workflow run info
      contents: read # Clone the repository
      security-events: write # Upload SARIF results to Code Scanning
    steps:
      - uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            pkg-containers.githubusercontent.com:443
            ghcr.io

      - name: Check out code
        uses: chainguard-actions/actions-checkout@48b05545e7d29b75b245be40bb8d866c8523ac49 # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: chainguard-actions/zizmorcore-zizmor-action@a82b960df159875a8dd2683df999f1b8ab188f31 # v0.5.2
