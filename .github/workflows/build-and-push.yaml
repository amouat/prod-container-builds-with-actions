name: Simple Build

on:
  push:
  workflow_dispatch:

jobs:
  docker:
    permissions: # needed for signing and attestations
     id-token: write # write seems weird, but it is correct per docs
     attestations: write
     contents: read
     packages: write

    runs-on: ubuntu-latest

    steps:
      - 
        name: Install Cosign
        uses: chainguard-actions/sigstore-cosign-installer@65ce94cb2e152e8e42826c8ad06386bf4074b6a3 # v4.1.2
      -
        name: Set up Docker Buildx
        uses: chainguard-actions/docker-setup-buildx-action@8fbaa429a8f774ef64700ee4749056cd9aba100b # v3
      -
        name: Login to GitHub Container Registry
        uses: chainguard-actions/docker-login-action@e4b5bd18aa76ef63d5bac7729bb77cca087fb591 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - 
        name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: chainguard-actions/docker-metadata-action@f6351596652d2adfcc044e05dad701b11e2c783b # v6.0.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-simple
          labels: |
            org.opencontainers.image.description=Demo Simple Build
      -
        name: Build and push
        id: build
        uses: chainguard-actions/docker-build-push-action@1d730b19ab3e753ee93137291b02df125e88eb3c # v7.3.0
        with:
          file: Dockerfile
          platforms: linux/amd64
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      -
        name: Attest
        uses: chainguard-actions/actions-attest-build-provenance@a9954ba7a28fa00853124e5dafaa8037430c48e9 # v4.1.0
        id: attest
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-simple
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - 
        name: Sign the images with GitHub OIDC Token
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}
